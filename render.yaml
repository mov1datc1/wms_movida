services:
  - type: web
    name: wms-backend
    runtime: node
    rootDir: wms-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        value: mail.movidatci.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: wms@movidatci.com
      - key: SMTP_PASS
        sync: false
      - key: NODE_ENV
        value: production
